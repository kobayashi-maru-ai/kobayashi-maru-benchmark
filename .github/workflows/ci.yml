name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install locked Python dependencies
        run: uv sync --frozen --group dev

      - name: Lint Python
        run: uv run --frozen ruff check .

      - name: Test benchmark
        run: uv run --frozen pytest

      - name: Verify standalone wheel
        run: |
          uv build
          uvx --from dist/kobayashi_benchmark-0.2.0-py3-none-any.whl \
            kobayashi dataset build --output /tmp/kobayashi-wheel-data
          test "$(find /tmp/kobayashi-wheel-data -name '*.jsonl' | wc -l)" -eq 4

      - name: Verify public exports are reproducible
        run: |
          uv run --frozen kobayashi export-web --output /tmp/kobayashi-web-data
          diff -ru apps/web/public/data /tmp/kobayashi-web-data

  web:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install pnpm
        uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6

      - name: Install Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install locked JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check web application
        run: pnpm web:typecheck

      - name: Lint web application
        run: pnpm web:lint

      - name: Build static web application
        run: pnpm web:build
