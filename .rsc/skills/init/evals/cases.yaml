skill: init

# Cases for the rsc-skills "init" front door / bootstrapper.
# init profiles the user (technical level + accompaniment dial), discovers what
# they want to BUILD or GOVERN (code OR a non-code harness), recommends rsc
# skills, and hands off to the harness skill. It is NOT the scaffolder and NOT
# a specific stack skill.

should_trigger:
  - prompt: "Quiero montar un proyecto nuevo pero no sé por dónde empezar."
    why: "Canonical greenfield entry with explicit uncertainty ('no sé por dónde empezar') — init's job is to gauge level, discover, and recommend before anything is built."

  - prompt: "I have an existing repo and I want to set up the harness on it. Where do I start?"
    why: "Brownfield bootstrapping: pointing the rsc harness at an existing project is exactly init's front-door role (detect greenfield vs brownfield, profile, recommend skills)."

  - prompt: "Acabo de instalar esto. ¿Qué hago primero?"
    why: "First-contact phrasing without naming any tool — init is the literal first thing you run; it should claim 'what do I do first' onboarding moments."

  - prompt: "Tengo una idea para una app pero soy de negocio, no técnico. Ayúdame a arrancar esto desde cero."
    why: "Greenfield + explicitly non-technical user — init leads with the technical-level question and the accompaniment dial, the core reason it exists, before any stack choice."

  - prompt: "I want to use this to run my company's operations, not to write code. Can I bootstrap that here?"
    why: "Non-code harness (company/ops) bootstrap — init is domain-agnostic and explicitly governs non-code harnesses the same way; this is a deliberately non-obvious trigger."

  - prompt: "Set me up. I want to build a personal knowledge base / wiki with this."
    why: "'Set me up' + a non-code knowledge-base goal: init profiles and recommends (likely harness, possibly marketing) then hands off to harness — it owns the setup conversation, not a specific stack skill."

  - prompt: "Bootstrap a workspace for a research program I'm planning."
    why: "Explicit 'bootstrap a workspace' for a non-code (research) domain — init's discover+recommend+handoff flow, including the iron rule that 'project' is not assumed to mean code."

should_not_trigger:
  - prompt: "Create a CLAUDE.md file documenting the architecture of this existing codebase."
    route_to: "none"
    why: "This is the built-in /init (CLAUDE.md generator), not the rsc-skills front door. init only writes the user-profile + a Knowledge-map link, and it does NOT scaffold or document the codebase — that is harness/other tooling. No rsc sibling owns generic architecture docs, so route to none."

  - prompt: "Run the scaffolding now — create the 01-TOOLS and 02-DOCS folders and wire up the structure."
    route_to: "harness"
    why: "init explicitly hands off scaffolding to the harness skill. The moment the user asks to actually BUILD 01-TOOLS/02-DOCS, it is harness's job, not init's (init writes only the profile + link)."

  - prompt: "Set up a FastAPI backend with a Postgres database for my new service."
    why: "User already knows the stack and wants a specific backend built — this is the fastapi/backend stack skill, not the level-gauging front door. init recommends skills; it does not implement stacks."
    route_to: "fastapi"

  - prompt: "Help me pick and configure a deploy target — Hetzner vs Vercel vs Fly.io — and ship it."
    why: "Although init uses the 3-option deploy example to illustrate the decision pattern, an actual 'configure and ship the deployment' request is the deployment ops skill's runtime job, which init only references."
    route_to: "deployment"

  - prompt: "Scaffold a new Next.js app with the App Router and Tailwind."
    route_to: "nextjs"
    why: "Concrete frontend build with a named framework — the nextjs stack skill. init would only ever recommend the nextjs skill, not scaffold the app itself."

  - prompt: "Review this auth code for security issues like injection and broken access control."
    route_to: "secure-coding"
    why: "A security-only review of existing code, no bootstrapping or profiling involved — squarely the secure-coding skill, not the front-door init."

capability:
  - scenario: "A non-technical founder says: 'I want to build an app to connect dog owners but I don't know where to start.' Show how init opens the engagement."
    must_include:
      - "Asks the technical-level question FIRST, before any discovery or recommendation (e.g. 'are you comfortable with code or prefer plain language?'), and records technical_level"
      - "Presents the accompaniment dial L0–L3 and, given a silent non-technical user, defaults to L3 (full accompaniment)"
      - "Persists the profile to 02-DOCS/wiki/harness/user-profile.md and an append-only 02-DOCS/wiki/harness/decisions.md, and links both from a ## Knowledge map section in root CLAUDE.md (creating CLAUDE.md if absent, additive only)"
      - "Detects greenfield vs brownfield rather than assuming, and runs DISCOVER (goals, audience, constraints, surfaces) before recommending"
      - "Recommends specific rsc skills matched to discovery (at minimum harness; nextjs/flutter + design if app surfaces justify it) and PRINTS the exact install commands (npx @ericrisco/rsc add <skill> ...)"
      - "Does NOT install anything itself and does NOT scaffold 01-TOOLS/02-DOCS — it hands off to the harness skill as the final step"
      - "Does not recommend speculative skills (e.g. building-agents) unless discovery justified them"

  - scenario: "A user with an existing multi-package repo says: 'Point the harness at my project and get me started.' Show the brownfield front-door flow."
    must_include:
      - "Still asks the technical-level question and sets the accompaniment dial first — profile before anything, even on brownfield"
      - "Detects brownfield via manifests (package.json / pyproject.toml / pubspec.yaml / go.mod / Cargo.toml), source files, legacy XX-* folders, or existing 01-TOOLS/02-DOCS, with a read-only scan that ignores node_modules/.venv/.next/.git/dist/build"
      - "Summarizes the detected stack and current state and CONFIRMS with the user instead of assuming"
      - "Writes profile + decisions log under 02-DOCS/wiki/harness/ and adds the Knowledge-map link to CLAUDE.md without deleting existing content"
      - "Recommends skills matched to the detected stack and prints the exact install commands, recommending only what was justified"
      - "Hands off to the harness skill for the actual 01-TOOLS/02-DOCS scaffolding/migration rather than doing it inside init"
