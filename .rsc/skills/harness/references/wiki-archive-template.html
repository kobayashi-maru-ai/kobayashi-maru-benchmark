<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{TITLE}} — Archived {{ARCHIVED_DATE}}</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root {
    --bg: #fafbfc; --panel: #ffffff; --panel-2: #f4f6f9; --border: #e5e7eb;
    --text: #1a1d23; --muted: #6b7280; --accent: #2563eb; --tldr-bg: #fff7e6; --tldr-border: #fcd34d;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #0f1115; --panel: #161a22; --panel-2: #1d2230; --border: #2a3140;
            --text: #e6e8ee; --muted: #8b94a8; --accent: #7aa2f7;
            --tldr-bg: #2a2410; --tldr-border: #ca8a04; }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 15px; line-height: 1.65; }
  .layout { max-width: 1100px; margin: 0 auto; padding: 32px 24px; display: grid; grid-template-columns: 1fr 260px; gap: 32px; }
  @media (max-width: 820px) { .layout { grid-template-columns: 1fr; } aside { order: 2; } }
  main { min-width: 0; }
  aside { position: sticky; top: 24px; align-self: start; }
  h1 { font-size: 28px; line-height: 1.25; margin: 0 0 8px; font-weight: 600; }
  h2 { font-size: 19px; margin: 28px 0 10px; font-weight: 600; scroll-margin-top: 24px; }
  h3 { font-size: 16px; margin: 18px 0 8px; font-weight: 600; }
  p { margin: 0 0 14px; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  code { font-family: var(--mono); font-size: 13px; background: var(--panel-2); padding: 1px 5px; border-radius: 4px; }
  pre { font-family: var(--mono); font-size: 13px; background: var(--panel-2); padding: 12px 14px; border-radius: 6px; overflow-x: auto; border: 1px solid var(--border); }
  blockquote { border-left: 3px solid var(--accent); padding: 4px 14px; margin: 14px 0; color: var(--muted); }
  .meta { color: var(--muted); font-family: var(--mono); font-size: 12px; margin-bottom: 18px; }
  .tldr { background: var(--tldr-bg); border: 1px solid var(--tldr-border); border-radius: 8px; padding: 14px 18px; margin: 0 0 24px; }
  .tldr-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 4px; }
  .tldr-body { font-size: 16px; line-height: 1.55; }
  .sources { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
  .sources h3 { margin: 0 0 8px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
  .sources ul { list-style: none; padding: 0; margin: 0; }
  .sources li { padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .sources li:last-child { border-bottom: none; }
  .footer { margin-top: 36px; padding-top: 18px; border-top: 1px solid var(--border); color: var(--muted); font-size: 12px; font-family: var(--mono); }
</style>
</head>
<body>
<div class="layout">
  <main>
    <h1>{{TITLE}}</h1>
    <div class="meta">Archived {{ARCHIVED_DATE}} · Topic: {{TOPIC}}</div>

    <div class="tldr">
      <div class="tldr-label">TL;DR</div>
      <div class="tldr-body">{{TLDR}}</div>
    </div>

    {{BODY_HTML}}
    <!--
      Body sections: render each section as <h2> + content. Use <h3> for
      subsections. Use <blockquote> for important quotes from sources.
      Inline SVG diagrams welcome — this is the format Thariq wants.
    -->

    <div class="footer">
      Point-in-time archived answer. Not cascade-updated when sources change;
      Deep Improve flags it stale if cited articles are updated after this date.
    </div>
  </main>

  <aside>
    <div class="sources">
      <h3>Sources</h3>
      <ul>
        {{SOURCES_LIST}}
        <!-- Each source: <li><a href="../topic/article.md">Article Title</a></li> -->
      </ul>
    </div>
  </aside>
</div>
</body>
</html>
