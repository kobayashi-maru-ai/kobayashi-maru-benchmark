        # KINDE
        Auth + user management with feature flags built in.
      CREDENTIALS.md: |
        Dashboard: https://app.kinde.com
        `KINDE_ISSUER_URL` is `https://<subdomain>.kinde.com`.
        Management API needs M2M client (see KINDE_M2M_*).

