      PADDLE_ENV=sandbox
    files:
      test_connection.sh: |
        #!/usr/bin/env bash
        set -euo pipefail
        SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
        set -a; source "$SCRIPT_DIR/.env"; set +a
        : "${PADDLE_API_KEY:?PADDLE_API_KEY not set}"
        HOST="https://api.paddle.com"
