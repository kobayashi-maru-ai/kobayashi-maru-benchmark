        Enterprise feature flagging + experimentation.
      CREDENTIALS.md: |
        Dashboard: https://app.launchdarkly.com/settings/authorization
        `LAUNCHDARKLY_API_KEY` — for REST API.
        `LAUNCHDARKLY_SDK_KEY` — per-environment, for runtime SDKs.

  - id: FLAGSMITH
    category: feature_flags
    detectors:
      imports: ["flagsmith", "flagsmith-nodejs"]
      env_vars: ["FLAGSMITH_ENVIRONMENT_KEY", "FLAGSMITH_API_URL", "FLAGSMITH_API_TOKEN"]
      deps: ["flagsmith", "flagsmith-nodejs"]
    dashboard_url: "https://app.flagsmith.com"
    env_example: |
      FLAGSMITH_API_URL=https://edge.api.flagsmith.com/api/v1
      FLAGSMITH_ENVIRONMENT_KEY=
    files:
      test_connection.sh: |
        #!/usr/bin/env bash
        set -euo pipefail
        SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
        set -a; source "$SCRIPT_DIR/.env"; set +a
        : "${FLAGSMITH_ENVIRONMENT_KEY:?FLAGSMITH_ENVIRONMENT_KEY not set}"
        URL="${FLAGSMITH_API_URL:-https://edge.api.flagsmith.com/api/v1}"
        # Fetch flags for the env (anonymous identity).
        curl -fsS "${URL%/}/flags/" -H "X-Environment-Key: $FLAGSMITH_ENVIRONMENT_KEY" >/dev/null
        echo "OK — Flagsmith environment key valid."
      README.md: |
        # FLAGSMITH
        Open-source feature flagging + remote config. Cloud or self-hosted.
      CREDENTIALS.md: |
        Dashboard: https://app.flagsmith.com
        Environment key per env (dev/staging/prod). Admin tokens for management API.

  # ------------------------------------------------------------------
  # Chatops & automation
  # ------------------------------------------------------------------

  - id: SLACK_WEBHOOK
    category: chat_webhooks
    detectors:
      imports: ["@slack/webhook", "@slack/web-api", "slack_sdk"]
      env_vars: ["SLACK_WEBHOOK_URL", "SLACK_BOT_TOKEN"]
      deps: ["@slack/webhook", "@slack/web-api", "slack-sdk"]
    dashboard_url: "https://api.slack.com/apps"
    env_example: |
      SLACK_WEBHOOK_URL=
      SLACK_BOT_TOKEN=
    files:
      test_connection.sh: |
        #!/usr/bin/env bash
        # Posts a test message — visible in the target channel.
        set -euo pipefail
        SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
        set -a; source "$SCRIPT_DIR/.env"; set +a
        : "${SLACK_WEBHOOK_URL:?SLACK_WEBHOOK_URL not set}"
        curl -fsS -X POST -H "Content-Type: application/json" \
          --data '{"text":"harness smoke-test — ignore."}' \
          "$SLACK_WEBHOOK_URL" | grep -q ok
        echo "OK — Slack webhook posted a test message."
      README.md: |
        # SLACK_WEBHOOK
        Incoming webhooks + bot token for richer flows (chat.postMessage).
        > The smoke-test posts a visible message to the target channel.
      CREDENTIALS.md: |
        Dashboard: https://api.slack.com/apps
        Incoming webhook URL is per-channel. Bot tokens (xoxb-…) for Web API.

  - id: DISCORD_WEBHOOK
    category: chat_webhooks
    detectors:
      imports: ["discord.js", "from discord", "import discord"]
      env_vars: ["DISCORD_WEBHOOK_URL", "DISCORD_BOT_TOKEN"]
      deps: ["discord.js", "discord.py"]
    dashboard_url: "https://discord.com/developers/applications"
    env_example: |
      DISCORD_WEBHOOK_URL=
    files:
      test_connection.sh: |
        #!/usr/bin/env bash
        # GET on the webhook URL returns its metadata without sending a message.
        set -euo pipefail
        SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
        set -a; source "$SCRIPT_DIR/.env"; set +a
        : "${DISCORD_WEBHOOK_URL:?DISCORD_WEBHOOK_URL not set}"
        NAME=$(curl -fsS "$DISCORD_WEBHOOK_URL" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("name","?"))')
        echo "OK — Discord webhook: $NAME."
      README.md: |
        # DISCORD_WEBHOOK
        Incoming webhook for posting messages to a channel.
      CREDENTIALS.md: |
        Dashboard: https://discord.com/developers/applications
        Webhook URL contains an embedded token — treat as secret.

  - id: TELEGRAM_BOT
    category: chat_webhooks
    detectors:
      imports: ["python-telegram-bot", "telegraf", "node-telegram-bot-api"]
      env_vars: ["TELEGRAM_BOT_TOKEN", "TELEGRAM_CHAT_ID"]
      deps: ["python-telegram-bot", "telegraf", "node-telegram-bot-api"]
    dashboard_url: "https://t.me/BotFather"
    env_example: |
      TELEGRAM_BOT_TOKEN=
      TELEGRAM_CHAT_ID=
    files:
      test_connection.sh: |
        #!/usr/bin/env bash
        set -euo pipefail
        SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
        set -a; source "$SCRIPT_DIR/.env"; set +a
        : "${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN not set}"
        NAME=$(curl -fsS "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getMe" | python3 -c 'import json,sys; print(json.load(sys.stdin)["result"]["username"])')
        echo "OK — Telegram bot: @$NAME."
      README.md: |
        # TELEGRAM_BOT
        Create a bot with @BotFather, then drive it via the Bot API.
      CREDENTIALS.md: |
        Dashboard: https://t.me/BotFather (chat with @BotFather to create/manage bots)
        `TELEGRAM_BOT_TOKEN` — secret. Chat ID is the user/group to message.

  - id: N8N
    category: automatizacion
    detectors:
      imports: []
      env_vars: ["N8N_API_KEY", "N8N_HOST"]
      deps: []
    dashboard_url: "https://app.n8n.cloud/settings/api"
    env_example: |
      N8N_HOST=
      N8N_API_KEY=
    files:
      test_connection.sh: |
        #!/usr/bin/env bash
        set -euo pipefail
        SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
        set -a; source "$SCRIPT_DIR/.env"; set +a
        : "${N8N_HOST:?N8N_HOST not set}"
        : "${N8N_API_KEY:?N8N_API_KEY not set}"
        N=$(curl -fsS "${N8N_HOST%/}/api/v1/workflows?limit=1" -H "X-N8N-API-KEY: $N8N_API_KEY" | python3 -c 'import json,sys; print(len(json.load(sys.stdin)["data"]))')
        echo "OK — n8n workflows endpoint accessible (sample: $N)."
      README.md: |
        # N8N
        Open-source workflow automation. Self-hosted or n8n Cloud.
      CREDENTIALS.md: |
        Dashboard: https://app.n8n.cloud/settings/api (or self-hosted equivalent).
        `N8N_API_KEY` — secret. Required for all REST API calls.
        API surface: workflows CRUD + `/activate` `/deactivate` + `/workflows/{id}/execute`
        (recent; no custom input — use a Webhook trigger for runtime params). See the `n8n` skill.

  - id: MAKE
    category: automatizacion
    detectors:
      imports: []
      env_vars: ["MAKE_API_TOKEN", "MAKE_ZONE"]
      deps: []
    dashboard_url: "https://www.make.com/en/help/tools/api"
    env_example: |
      MAKE_ZONE=eu1.make.com        # your zone: eu1/eu2/us1/us2 (wrong zone => auth error)
      MAKE_API_TOKEN=               # Profile > API/token; scopes are fixed at creation
      MAKE_TEAM_ID=
    files:
      test_connection.sh: |
        #!/usr/bin/env bash
        set -euo pipefail
        SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
        set -a; source "$SCRIPT_DIR/.env"; set +a
        : "${MAKE_ZONE:?MAKE_ZONE not set (e.g. eu1.make.com)}"
        : "${MAKE_API_TOKEN:?MAKE_API_TOKEN not set}"
        # envelope-agnostic smoke test: -f fails on 4xx/5xx (wrong zone/token); no response-shape parsing
        curl -fsS "https://${MAKE_ZONE%/}/api/v2/users/me" -H "Authorization: Token $MAKE_API_TOKEN" > /dev/null
        echo "OK — Make API reachable on $MAKE_ZONE (token accepted)."
      README.md: |
        # MAKE
        Make.com (formerly Integromat). Scenarios via /api/v2; blueprint is a stringified JSON
        round-trip. Base URL is zone-scoped. See the `make` skill for dynamic create/manage.
      CREDENTIALS.md: |
        Dashboard: Profile > API (https://www.make.com/en/help/tools/api).
        `MAKE_API_TOKEN` — secret; token scopes are immutable after creation. Wrong `MAKE_ZONE`
        returns an auth error even with a valid token. Endpoints are case-sensitive.

  - id: ZAPIER
    category: automatizacion
    detectors:
      imports: []
      env_vars: ["ZAPIER_MCP_URL", "ZAPIER_MCP_API_KEY"]
      deps: []
    dashboard_url: "https://mcp.zapier.com"
    env_example: |
      ZAPIER_MCP_URL=https://mcp.zapier.com/api/v1/connect
      ZAPIER_MCP_API_KEY=           # Bearer key from the Zapier MCP dashboard (2 tasks per call)
    files:
      test_connection.sh: |
        #!/usr/bin/env bash
        set -euo pipefail
        SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
        set -a; source "$SCRIPT_DIR/.env"; set +a
        : "${ZAPIER_MCP_URL:?ZAPIER_MCP_URL not set}"
        : "${ZAPIER_MCP_API_KEY:?ZAPIER_MCP_API_KEY not set}"
        # Zapier exposes no account-CRUD REST API; smoke-test the MCP endpoint with an initialize handshake.
        CODE=$(curl -s -o /dev/null -w '%{http_code}' -X POST "$ZAPIER_MCP_URL" \
          -H "Authorization: Bearer $ZAPIER_MCP_API_KEY" -H "Content-Type: application/json" \
          -H "Accept: application/json, text/event-stream" \
          -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"rsc","version":"1"}}}')
        case "$CODE" in 2*) echo "OK — Zapier MCP endpoint reachable (HTTP $CODE).";; *) echo "FAIL — HTTP $CODE" >&2; exit 1;; esac
      README.md: |
        # ZAPIER
        Zapier has NO public API for a normal user to create/manage their own Zaps. Programmatic
        use = Zapier MCP (runs pre-configured actions across 9,000+ apps; does not author Zaps).
        See the `zapier` skill for the honest boundary and when to use n8n/Make instead.
      CREDENTIALS.md: |
        Dashboard: https://mcp.zapier.com — generate an MCP server + Bearer key.
        `ZAPIER_MCP_API_KEY` — secret (Bearer). Each successful tool call costs 2 Zapier tasks.

  - id: POWER_AUTOMATE
    category: automatizacion
    detectors:
      imports: []
      env_vars: ["PA_DATAVERSE_URL", "PA_TENANT_ID", "PA_CLIENT_ID", "PA_CLIENT_SECRET"]
      deps: []
    dashboard_url: "https://make.powerautomate.com"
    env_example: |
      PA_DATAVERSE_URL=https://<org>.crm.dynamics.com   # your Dataverse org URL (region domain varies)
      PA_TENANT_ID=                 # Entra tenant id
      PA_CLIENT_ID=                 # Entra app registration (needs a Dataverse application user)
      PA_CLIENT_SECRET=
    files:
      test_connection.sh: |
        #!/usr/bin/env bash
        set -euo pipefail
        SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
        set -a; source "$SCRIPT_DIR/.env"; set +a
        : "${PA_DATAVERSE_URL:?PA_DATAVERSE_URL not set}"
        : "${PA_TENANT_ID:?PA_TENANT_ID not set}"; : "${PA_CLIENT_ID:?PA_CLIENT_ID not set}"; : "${PA_CLIENT_SECRET:?PA_CLIENT_SECRET not set}"
        TOKEN=$(curl -fsS "https://login.microsoftonline.com/${PA_TENANT_ID}/oauth2/v2.0/token" \
          -d "grant_type=client_credentials&client_id=${PA_CLIENT_ID}&client_secret=${PA_CLIENT_SECRET}&scope=${PA_DATAVERSE_URL%/}/.default" \
          | python3 -c 'import json,sys; print(json.load(sys.stdin)["access_token"])')
        N=$(curl -fsS "${PA_DATAVERSE_URL%/}/api/data/v9.2/workflows?\$filter=category%20eq%205&\$top=1" \
          -H "Authorization: Bearer $TOKEN" -H "Accept: application/json" | python3 -c 'import json,sys; print(len(json.load(sys.stdin)["value"]))')
        echo "OK — Dataverse reachable; cloud-flow query returned $N row(s)."
      README.md: |
        # POWER_AUTOMATE
        Microsoft Power Automate cloud flows via the Dataverse Web API (solution-aware flows only;
        `api.flow.microsoft.com` is unsupported). Auth is Entra OAuth. See the `power-automate` skill.
      CREDENTIALS.md: |
        Register an Entra app; add it as a Dataverse application user with a security role granting
        Process (workflow) privileges. `PA_CLIENT_SECRET` — secret. Only flows inside a Dataverse
        solution are code-manageable; personal "My Flows" are not.

